name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Ensure only one release job runs at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Check if we should create a release (when version changes)
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      is_pr: ${{ steps.check.outputs.is_pr }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        id: check
        run: |
          # For PRs, always build to validate the pipeline
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build - will build but skip release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "version=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # For tag pushes, extract version from tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
            echo "Tag push detected: v$VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # For main branch push, check package.json version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # Check if tag already exists
          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$CURRENT_VERSION does not exist, will create release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  # Build for macOS
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloudflared binary
        run: bun run update:cloudflared
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app
        run: bun run build

      - name: Run predist script
        run: bun scripts/predist.ts
        env:
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Package for macOS ${{ matrix.arch }}
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # Code signing for macOS (requires Apple Developer certificates)
          # Set CSC_LINK and CSC_KEY_PASSWORD secrets for production releases
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}

      - name: Verify release artifacts
        run: |
          echo "=== All release artifacts ==="
          ls -la release/
          echo ""
          echo "=== Checking required files ==="
          test -f release/latest-mac.yml && echo "✓ latest-mac.yml exists" || echo "✗ latest-mac.yml MISSING"
          ls release/*.zip 2>/dev/null && echo "✓ zip file(s) exist" || echo "✗ zip file(s) MISSING"
          ls release/*.dmg 2>/dev/null && echo "✓ dmg file(s) exist" || echo "✗ dmg file(s) MISSING"
          # Fail if critical auto-update files are missing
          test -f release/latest-mac.yml || { echo "ERROR: latest-mac.yml not generated"; exit 1; }
          ls release/*.zip >/dev/null 2>&1 || { echo "ERROR: zip file not generated"; exit 1; }

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

  # Build for Windows
  build-windows:
    name: Build Windows
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloudflared binary
        run: bun run update:cloudflared
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app
        run: bun run build

      - name: Run predist script
        run: bun scripts/predist.ts

      - name: Package for Windows
        run: npx electron-builder --win --publish never

      - name: Verify release artifacts
        run: |
          echo "=== All release artifacts ==="
          dir release\
          echo ""
          if exist "release\latest.yml" (echo latest.yml exists) else (echo ERROR: latest.yml MISSING && exit /b 1)
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  # Create GitHub Release (skip for PRs)
  release:
    name: Create Release
    needs: [check-version, build-macos, build-windows]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.is_pr != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== All downloaded artifacts ==="
          find artifacts -type f | sort
          echo ""
          echo "=== Checking required update files ==="
          find artifacts -name "latest.yml" -o -name "latest-mac.yml" | sort
          find artifacts -name "*.zip" | sort

      - name: Merge macOS latest-mac.yml for multi-arch support
        shell: bash
        run: |
          # electron-updater expects a single latest-mac.yml with files entries for
          # both arm64 and x64 architectures. Since we build them separately, we need
          # to merge the two yml files into one.
          pip3 install pyyaml --quiet
          python3 << 'PYEOF'
          import yaml, sys, os

          arm64_yml = "artifacts/macos-arm64/latest-mac.yml"
          x64_yml = "artifacts/macos-x64/latest-mac.yml"
          output_yml = "artifacts/latest-mac.yml"

          ymls = {}
          for arch, fpath in [("arm64", arm64_yml), ("x64", x64_yml)]:
              if os.path.exists(fpath):
                  with open(fpath) as f:
                      ymls[arch] = yaml.safe_load(f)
                  print(f"Loaded {arch} yml: {ymls[arch]}")
              else:
                  print(f"WARNING: {fpath} not found, skipping {arch}")

          if not ymls:
              print("ERROR: No latest-mac.yml files found")
              sys.exit(1)

          base_arch = list(ymls.keys())[0]
          merged = ymls[base_arch].copy()

          all_files = []
          for arch, data in ymls.items():
              if "files" in data:
                  all_files.extend(data["files"])

          merged["files"] = all_files

          if all_files:
              merged["path"] = all_files[0].get("url", merged.get("path", ""))
              merged["sha512"] = all_files[0].get("sha512", merged.get("sha512", ""))

          with open(output_yml, "w") as f:
              yaml.dump(merged, f, default_flow_style=False, allow_unicode=True)

          print(f"Merged latest-mac.yml written to {output_yml}")
          print(f"Contains {len(all_files)} file entries:")
          for entry in all_files:
              print(f"  - {entry.get('url', 'unknown')}")
          PYEOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: CodeMux v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/latest.yml
            artifacts/latest-mac.yml

  # Update Homebrew Tap
  update-homebrew:
    name: Update Homebrew Tap
    needs: [check-version, release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for release assets to be available
        run: sleep 30

      - name: Calculate SHA256 checksums
        id: sha
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          TMPDIR="$(mktemp -d)"

          curl -fL --retry 5 --retry-delay 5 -o "${TMPDIR}/arm64.zip" \
            "https://github.com/realDuang/codemux/releases/download/v${VERSION}/CodeMux-${VERSION}-arm64-mac.zip"
          curl -fL --retry 5 --retry-delay 5 -o "${TMPDIR}/x64.zip" \
            "https://github.com/realDuang/codemux/releases/download/v${VERSION}/CodeMux-${VERSION}-mac.zip"

          test -s "${TMPDIR}/arm64.zip"
          test -s "${TMPDIR}/x64.zip"

          ARM64_SHA=$(shasum -a 256 "${TMPDIR}/arm64.zip" | cut -d ' ' -f 1)
          X64_SHA=$(shasum -a 256 "${TMPDIR}/x64.zip" | cut -d ' ' -f 1)
          echo "arm64_sha=${ARM64_SHA}" >> $GITHUB_OUTPUT
          echo "x64_sha=${X64_SHA}" >> $GITHUB_OUTPUT
          echo "ARM64 SHA256: ${ARM64_SHA}"
          echo "X64 SHA256: ${X64_SHA}"

      - name: Generate Cask formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
        run: |
          python3 -c "
          import os
          v = os.environ['VERSION']
          arm = os.environ['ARM64_SHA']
          x64 = os.environ['X64_SHA']
          formula = '''cask \"codemux\" do
            version \"{version}\"

            on_arm do
              sha256 \"{arm64_sha}\"
              url \"https://github.com/realDuang/codemux/releases/download/v#{{version}}/CodeMux-#{{version}}-arm64-mac.zip\"
            end

            on_intel do
              sha256 \"{x64_sha}\"
              url \"https://github.com/realDuang/codemux/releases/download/v#{{version}}/CodeMux-#{{version}}-mac.zip\"
            end

            name \"CodeMux\"
            desc \"Multi-engine AI coding assistant client\"
            homepage \"https://github.com/realDuang/codemux\"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true
            depends_on macos: \">= :ventura\"

            app \"CodeMux.app\"

            zap trash: [
              \"~/Library/Application Support/codemux\",
              \"~/Library/Preferences/dev.codemux.app.plist\",
              \"~/Library/Saved Application State/dev.codemux.app.savedState\",
            ]
          end
          '''.format(version=v, arm64_sha=arm, x64_sha=x64)
          with open('homebrew/codemux.rb', 'w') as f:
              f.write(formula)
          print(formula)
          "
          echo "=== Generated codemux.rb ==="
          cat homebrew/codemux.rb

      - name: Push to Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/realDuang/homebrew-codemux.git tap-repo
          mkdir -p tap-repo/Casks
          cp homebrew/codemux.rb tap-repo/Casks/codemux.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codemux.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update CodeMux to v${VERSION}"
          git push
