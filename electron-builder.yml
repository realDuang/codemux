appId: dev.codemux.app
productName: CodeMux
directories:
  output: release
  buildResources: resources
icon: public/assets/icon.png
publish:
  provider: github
  owner: realDuang
  repo: codemux
files:
  - out/**/*
  - package.json
asarUnpack:
  - node_modules/@github/copilot-*/**
  - node_modules/@parcel/watcher*/**
extraMetadata:
  main: out/main/index.mjs
mac:
  identity: null
  target:
    - target: dmg
    - target: zip
  icon: public/assets/icon.png
  extraResources:
    - from: resources/cloudflared/darwin-${arch}
      to: cloudflared/darwin-${arch}
      filter:
        - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/assets/icon.ico
  extraResources:
    - from: resources/cloudflared/win32-${arch}
      to: cloudflared/win32-${arch}
      filter:
        - "**/*"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: "CodeMux-Setup-${version}.${ext}"
dmg:
  writeUpdateInfo: true
