appId: dev.codemux.app
productName: CodeMux
directories:
  output: release
  buildResources: resources
icon: public/assets/icon.png
publish:
  provider: github
  owner: realDuang
  repo: codemux
files:
  - out/**/*
  - package.json
asarUnpack:
  - node_modules/@anthropic-ai/claude-agent-sdk*/**
  - node_modules/@github/copilot-*/**
  - node_modules/@parcel/watcher*/**
extraMetadata:
  main: out/main/index.mjs
mac:
  identity: null
  target:
    - target: dmg
    - target: zip
  icon: public/assets/icon.png
  extraResources:
    - from: resources/cloudflared/darwin-${arch}
      to: cloudflared/darwin-${arch}
      filter:
        - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/assets/icon.ico
  extraResources:
    - from: resources/cloudflared/win32-${arch}
      to: cloudflared/win32-${arch}
      filter:
        - "**/*"
linux:
  icon: public/assets/icon.png
  category: Development
  maintainer: realDuang <250407778@qq.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  extraResources:
    - from: resources/cloudflared/linux-${arch}
      to: cloudflared/linux-${arch}
      filter:
        - "**/*"
  desktop:
    entry:
      Name: CodeMux
      Comment: Multi-engine AI coding assistant client
      Categories: Development;IDE;
      StartupWMClass: codemux
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: "CodeMux-Setup-${version}.${ext}"
dmg:
  writeUpdateInfo: true
