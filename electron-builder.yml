appId: dev.codemux.app
productName: CodeMux
directories:
  output: release
  buildResources: resources
icon: public/assets/icon.png
publish:
  provider: github
  owner: realDuang
  repo: codemux
files:
  - out/**/*
  - package.json
asarUnpack:
  - node_modules/@github/copilot-*/**
extraMetadata:
  main: out/main/index.mjs
mac:
  target:
    - dmg
    - zip
  icon: public/assets/icon.png
  extraResources:
    - from: resources/cloudflared/darwin-${arch}
      to: cloudflared/darwin-${arch}
      filter:
        - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/assets/icon.ico
  extraResources:
    - from: resources/cloudflared/win32-${arch}
      to: cloudflared/win32-${arch}
      filter:
        - "**/*"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
dmg:
  writeUpdateInfo: true
